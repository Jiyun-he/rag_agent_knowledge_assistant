services:
  mysql:
    image: mysql:8.4
    container_name: rag-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: rag_agent
      MYSQL_USER: rag_user
      MYSQL_PASSWORD: rag_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - rag_mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4
    container_name: rag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - rag_redis_data:/data

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rag-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: rag
      RABBITMQ_DEFAULT_PASS: rag123456
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rag_rabbitmq_data:/var/lib/rabbitmq

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - rag_qdrant_data:/qdrant/storage

volumes:
  rag_mysql_data:
  rag_redis_data:
  rag_rabbitmq_data:
  rag_qdrant_data: